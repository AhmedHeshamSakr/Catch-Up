# Seed sources. Replace with your curated list anytime.
sources:
  - id: techcrunch
    type: rss
    name: TechCrunch
    url: https://techcrunch.com/feed/
    category_hint: ai_tech
    enabled: true
  - id: the_verge
    type: rss
    name: The Verge
    url: https://www.theverge.com/rss/index.xml
    category_hint: ai_tech
    enabled: true
  - id: ft_companies
    type: rss
    name: Financial Times — Companies
    url: https://www.ft.com/companies?format=rss
    category_hint: business_finance
    enabled: true
  - id: aljazeera_all
    type: rss
    name: Al Jazeera
    url: https://www.aljazeera.com/xml/rss/all.xml
    category_hint: world_geopolitics
    enabled: true
  - id: arab_news
    type: rss
    name: Arab News
    url: https://www.arabnews.com/rss.xml
    category_hint: gulf_mena
    enabled: true
  - id: gnews_ai
    type: api
    name: GNews — AI
    query: artificial intelligence
    lang: en
    category_hint: ai_tech
    enabled: false
  - id: gnews_gulf
    type: api
    name: GNews — Gulf
    query: Qatar OR Gulf economy
    lang: en
    country: qa
    category_hint: gulf_mena
    enabled: false
  # Example scrape source — set a real selector before enabling.
  - id: example_scrape
    type: scrape
    name: Example Announcements
    url: https://example.com/news
    selector: a.headline
    category_hint: business_finance
    enabled: false
