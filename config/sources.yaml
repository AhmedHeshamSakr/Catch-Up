# Seed sources. Replace with your curated list anytime.
sources:
  - id: techcrunch
    type: rss
    name: TechCrunch
    url: https://techcrunch.com/feed/
    category_hint: ai_tech
    enabled: true
  - id: the_verge
    type: rss
    name: The Verge
    url: https://www.theverge.com/rss/index.xml
    category_hint: ai_tech
    enabled: true
  - id: ft_companies
    type: rss
    name: Financial Times — Companies
    url: https://www.ft.com/companies?format=rss
    category_hint: business_finance
    enabled: true
  - id: aljazeera_all
    type: rss
    name: Al Jazeera
    url: https://www.aljazeera.com/xml/rss/all.xml
    category_hint: world_geopolitics
    enabled: true
  - id: arab_news
    type: rss
    name: Arab News
    url: https://www.arabnews.com/rss.xml
    category_hint: gulf_mena
    enabled: true
  - id: gnews_ai
    type: api
    name: GNews — AI
    query: artificial intelligence
    lang: en
    category_hint: ai_tech
    enabled: false
  - id: gnews_gulf
    type: api
    name: GNews — Gulf
    query: Qatar OR Gulf economy
    lang: en
    country: qa
    category_hint: gulf_mena
    enabled: false
  # Scrape source TEMPLATE (commented out — not a live source). Scrape selectors
  # are site-specific and brittle, so copy this, point url at a real page, set a
  # CSS selector you've verified against that page's HTML, then enable it:
  #   - id: my_scrape
  #     type: scrape
  #     name: Some Newspaper — Headlines
  #     url: https://news.example.org/latest
  #     selector: "article h3 a"   # verify against the live page
  #     category_hint: business_finance
  #     enabled: true
  - id: search-ai-breakthroughs
    type: search
    name: AI Breakthroughs (Search)
    query: "most important AI and technology breakthroughs this week"
    category_hint: ai_tech
    enabled: false   # enable once Gemini quota is available — consumes model calls
  - id: youtube-mkbhd
    type: youtube
    name: MKBHD (YouTube)
    channel_id: UCBJycsmduvYEL83R_U4JriQ
    category_hint: ai_tech
    enabled: false   # enable when you want video monitoring (transcript lib free; summary needs Gemini)
